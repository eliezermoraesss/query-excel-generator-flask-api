<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='M.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
        }

        .topbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(20, 94, 231, 0.08);
        }

        .logo {
            max-width: 170px;
        }

        .result-card {
            border: 0;
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg topbar">
        <div class="container py-2">
            <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='Logo-Negativo.png') }}" alt="Logo Multfer" class="logo">
            </a>
            <div class="ms-auto d-flex gap-2">
                <a href="{{ url_for('index') }}" class="btn btn-outline-primary">Início</a>
                <a href="{{ url_for('historico') }}" class="btn btn-primary">Histórico</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card result-card p-4 rounded-4">
            <h2 class="mb-4 text-center">Queries Geradas</h2>
            <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">
                <button class="btn btn-primary px-4" onclick="copiarTexto()">Copiar</button>
                <a href="{{ url_for('download_sql') }}" class="btn btn-success px-4">Download SQL</a>
                <a href="{{ url_for('index') }}" class="btn btn-secondary px-4">Voltar</a>
            </div>
            <div>
                <label class="form-label fw-semibold">Resultado:</label>
                <textarea id="queriesBox" class="form-control" rows="18" readonly style="font-family: monospace;">{% for q in queries %}{{ q }}
{% endfor %}</textarea>
            </div>
        </div>
    </div>

    <script>
        function copiarTexto() {
            const textarea = document.getElementById("queriesBox");
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            document.execCommand("copy");
        }
    </script>
</body>
</html>
